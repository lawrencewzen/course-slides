<!DOCTYPE html>
<!--
  =====================================================================
  SKELETON · course-slides 技术骨架
  ---------------------------------------------------------------------
  装配最终 deck 时，下面这些部分**整段 verbatim 拷入**最终 .html，不要
  自己重写：

    CSS
    - 1. ROOT TOKENS · RESET          （品牌色 / 字体栈 / reset）
    - 2. DECK SHELL                   （16:9 letterbox + container-type）
    - 3. SHARED CHROME                （顶部进度条 / 面包屑 / 页码）
    - 4. SLIDE BASE & TRANSITION      （.slide opacity 切换 + .content 壳）
    - 5. ANIMATION PRIMITIVES         （.fade-up / .fade-in / .d1-.d8 /
                                       .no-anim / .step）
    - 15. SPEAKER NOTES PANEL
    - 16. HOTKEY HELP OVERLAY
    - 17. TIMER

    HTML
    - <symbol id="logo-flame">        （品牌火苗）
    - .deck 外壳 + .deck-progress + .deck-top 面包屑 + .deck-timer
    - .notes / .hotkey-help 浮层

    JS
    - DECK CONTROLLER                 （双 rAF 重播 / stepped / chrome 同步
                                       / 键盘 / 点击翻页）

  每页 slide 的**版式 CSS + HTML 结构**不在本骨架内。模型按 md 内容自由
  设计，受 SKILL.md 4 条视觉底线约束。版式思路可参考
  assets/example-deck.html（只看不抄）。

  独立打开本文件可验证骨架自洽：能看到 16:9 空壳 + "骨架占位"一张空 slide。
  =====================================================================
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[Course Title] · AI Spark</title>
<style>
/* ============================================================
   1. ROOT TOKENS · RESET
   ============================================================ */
:root {
  --brand: #1E40FF;
  --brand-soft: #EEF1FF;
  --brand-faint: #F5F7FF;
  --flame-1: #FFA92E;
  --flame-2: #EF4D2A;
  --flame-3: #C42138;
  --ink: #0A0A0A;
  --ink-2: #3A3A3C;
  --muted: #8E8E93;
  --muted-2: #C7C7CC;
  --line: #E5E5EA;
  --line-2: #F0F0F3;
  --bg: #F5F5F7;
  --code-bg: #1a1d24;
  --code-bg-2: #21252e;
  --code-fg: #d4d8e0;
  --code-line: #6b7280;
  --code-com: #5c6577;
  --code-num: #f78c6c;
  --code-str: #c3e88d;
  --warn: #b45309;
  --done: #047857;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  background: #000;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* ============================================================
   2. DECK SHELL (16:9 letterboxed)
   ============================================================ */
.deck {
  width: min(100vw, calc(100vh * 16 / 9));
  aspect-ratio: 16 / 9;
  background: white;
  position: relative;
  overflow: hidden;
  container-type: inline-size;
}

/* ============================================================
   3. SHARED CHROME (top progress + breadcrumb + pageno)
   ============================================================ */
.deck-progress {
  position: absolute; top: 0; left: 0; right: 0; height: 0.18cqw;
  background: var(--line-2); z-index: 50;
}
.deck-progress .fill {
  height: 100%; background: var(--brand);
  width: 0%;
  transition: width 0.5s cubic-bezier(0.2, 0.65, 0.2, 1);
}
.deck-top {
  position: absolute; top: 2.4cqw; left: 5cqw; right: 5cqw;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 1cqw; color: var(--muted); letter-spacing: 0.03em;
  z-index: 49;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.deck-top.visible { opacity: 1; }
.deck-top .breadcrumb { display: flex; align-items: center; gap: 0.7cqw; color: var(--ink-2); }
.deck-top .breadcrumb .sec { color: var(--brand); font-weight: 600; }
.deck-top .breadcrumb .div { color: var(--muted-2); }
.logo-mini { display: block; aspect-ratio: 100 / 110; height: auto; }
.deck-top .breadcrumb .logo-mini { width: 1.4cqw; flex-shrink: 0; }
.deck-top .pageno { font-feature-settings: "tnum"; color: var(--muted); }
.deck-top .pageno b { color: var(--ink-2); font-weight: 600; }

/* ============================================================
   4. SLIDE BASE & TRANSITION
   ============================================================ */
.slide {
  position: absolute; inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease;
}
.slide.active {
  opacity: 1;
  pointer-events: auto;
  z-index: 1;
}

/* shared content shell padding */
.slide.content {
  background: white;
  padding: 8cqw 6cqw 5cqw;
  display: flex; flex-direction: column;
}
.slide.content .eyebrow {
  font-size: 1.1cqw; color: var(--brand); font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  margin-bottom: 1.3cqw;
}
.slide.content h1 {
  font-size: 4.4cqw; font-weight: 700;
  letter-spacing: -0.02em; line-height: 1.15;
  margin-bottom: 2.4cqw;
}
.slide.content h1.smaller { font-size: 3.6cqw; }
.slide.content h1.tiny { font-size: 3.2cqw; margin-bottom: 1.6cqw; }
.slide.content h1 .accent {
  background: linear-gradient(transparent 70%, var(--brand-soft) 70%);
  padding: 0 0.05em;
}
.slide.content .body {
  display: flex; flex-direction: column; gap: 1.4cqw;
  font-size: 1.55cqw; line-height: 1.65; color: var(--ink-2);
  max-width: 92%;
}
.slide.content .body p strong {
  color: var(--ink); font-weight: 600;
  border-bottom: 0.18cqw solid var(--brand);
  padding-bottom: 0.05cqw;
}
.slide.content .body .key {
  color: var(--brand); font-weight: 600;
}
.slide.content .quote {
  margin-top: 2cqw;
  padding: 1.4cqw 1.6cqw;
  background: var(--brand-faint);
  border-left: 0.25cqw solid var(--brand);
  font-size: 1.4cqw; line-height: 1.6;
  color: var(--ink); font-weight: 500;
  font-style: italic;
}

/* ============================================================
   5. ANIMATION PRIMITIVES
   ============================================================ */
.fade-up {
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.85s cubic-bezier(0.2, 0.65, 0.2, 1),
              transform 0.85s cubic-bezier(0.2, 0.65, 0.2, 1);
}
.slide.active.playing .fade-up { opacity: 1; transform: translateY(0); }
.fade-in {
  opacity: 0;
  transition: opacity 0.85s cubic-bezier(0.2, 0.65, 0.2, 1);
}
.slide.active.playing .fade-in { opacity: 1; }
.d1 { transition-delay: 0.10s; } .d2 { transition-delay: 0.30s; }
.d3 { transition-delay: 0.50s; } .d4 { transition-delay: 0.70s; }
.d5 { transition-delay: 0.90s; } .d6 { transition-delay: 1.10s; }
.d7 { transition-delay: 1.30s; } .d8 { transition-delay: 1.50s; }
.no-anim, .no-anim *, .no-anim *::before, .no-anim *::after { transition: none !important; }

/* Stepped reveal (for 三条规则 / 三个动作 / 六步流程) */
.step {
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.6s cubic-bezier(0.2, 0.65, 0.2, 1),
              transform 0.6s cubic-bezier(0.2, 0.65, 0.2, 1);
}
.step.revealed { opacity: 1; transform: translateY(0); }

/* ============================================================
   15. SPEAKER NOTES PANEL
   ============================================================ */
.notes {
  position: fixed;
  right: 16px; bottom: 16px;
  width: 380px; max-height: 60vh;
  background: rgba(20, 20, 22, 0.96);
  color: #e5e5ea;
  border-radius: 12px;
  padding: 18px 20px;
  font-size: 13px; line-height: 1.65;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 200;
  overflow: auto;
  display: none;
}
.notes.visible { display: block; }
.notes .title {
  font-size: 11px; color: #8e8e93;
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.notes h3 {
  font-size: 14px; color: white;
  margin-bottom: 10px; font-weight: 600;
}
.notes .strategy {
  margin-bottom: 12px; padding: 8px 10px;
  background: rgba(30, 64, 255, 0.18);
  border-left: 3px solid #3b67ff;
  border-radius: 4px;
  color: #c8d4ff;
}
.notes .speak {
  color: #d4d4d8;
}
.notes .speak::before {
  content: '→ ';
  color: #6b7280;
}

/* ============================================================
   16. HOTKEY HELP OVERLAY
   ============================================================ */
.hotkey-help {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center; justify-content: center;
  z-index: 300;
}
.hotkey-help.visible { display: flex; }
.hotkey-help .panel {
  background: white;
  border-radius: 12px;
  padding: 28px 36px;
  font-size: 14px; line-height: 2;
  min-width: 320px;
}
.hotkey-help .panel h3 {
  font-size: 18px; font-weight: 600;
  margin-bottom: 12px;
}
.hotkey-help kbd {
  display: inline-block; padding: 1px 8px;
  background: #f0f0f3; border: 1px solid #d8d8dc;
  border-radius: 4px;
  font-family: ui-monospace, monospace; font-size: 12px;
  margin-right: 6px; min-width: 28px; text-align: center;
}

/* ============================================================
   17. TIMER (top-left, only visible on stage with breadcrumb)
   ============================================================ */
.deck-timer {
  position: absolute; top: 2.4cqw; left: 50%;
  transform: translateX(-50%);
  font-size: 1cqw;
  color: var(--muted);
  font-feature-settings: "tnum";
  z-index: 49;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.deck-timer.visible { opacity: 1; }
.deck-timer b { color: var(--ink-2); font-weight: 600; }
.deck-timer .sec-elapsed { color: var(--brand); font-weight: 600; }
.deck-timer .sep-dot { color: var(--muted-2); margin: 0 0.4cqw; }

/* ============================================================
   SKELETON-ONLY · 占位 slide 样式（装配时整段删掉，本骨架自检用）
   ============================================================ */
.slide.placeholder {
  display: flex; align-items: center; justify-content: center;
  padding: 6cqw; text-align: center;
}
.slide.placeholder .hint {
  font-size: 1.4cqw; color: var(--muted); letter-spacing: 0.02em;
  line-height: 1.7;
}
.slide.placeholder .hint b {
  color: var(--brand); font-weight: 600;
}
</style>
</head>
<body>

<!-- Shared SVG defs for the flame logo -->
<svg width="0" height="0" style="position: absolute;">
  <symbol id="logo-flame" viewBox="0 0 100 110">
    <linearGradient id="flameG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFA92E"/>
      <stop offset=".55" stop-color="#EF4D2A"/>
      <stop offset="1" stop-color="#C42138"/>
    </linearGradient>
    <linearGradient id="dropG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF2E1"/>
      <stop offset="1" stop-color="#FCD9B8"/>
    </linearGradient>
    <path fill="url(#flameG)" stroke="white" stroke-width="6" stroke-linejoin="round" style="paint-order: stroke fill"
          d="M 62 6 C 56 14 50 20 48 24 L 38 12 L 36 28 C 22 38 14 54 14 72 C 14 94 30 104 50 104 C 70 104 86 94 86 72 C 86 48 76 26 62 6 Z"/>
    <path fill="url(#dropG)"
          d="M 50 56 C 38 68 36 82 42 92 C 46 100 54 100 58 92 C 64 82 62 68 50 56 Z"/>
  </symbol>
</svg>

<div class="deck">

  <!-- ===== Deck-wide chrome ===== -->
  <div class="deck-progress"><div class="fill" id="prog-fill"></div></div>
  <div class="deck-top" id="deck-top">
    <div class="breadcrumb">
      <svg class="logo-mini"><use href="#logo-flame"/></svg>
      <span class="sec" id="bc-sec"></span>
      <span class="div">/</span>
      <span id="bc-name"></span>
    </div>
    <div class="pageno">页 <b id="bc-page">1</b> / <span id="bc-total">1</span></div>
  </div>
  <div class="deck-timer" id="deck-timer">
    <span>本节 <b id="t-sec-name"></b></span>
    <span class="sep-dot">·</span>
    <span>计划 <b id="t-sec-budget"></b> min</span>
    <span class="sep-dot">·</span>
    <span>已用 <span class="sec-elapsed" id="t-sec-elapsed">00:00</span></span>
  </div>

  <!-- ===========================================================
       SLIDES · 这里按 md 内容插入每页 slide
       ===========================================================
       每个 slide 用：
         <div class="slide [cover|content|divider|break]"
              data-section="N" data-section-name="..."
              data-time="N"  (duration in min, 可选)
              data-notes-strategy="..." (可选)
              data-notes-speak="..."    (可选)
              data-no-chrome="true"     (封面/休息/结束页用)
              data-steps="K"            (步进 reveal 页加，配 .stepped class)
              class="... stepped">      (走步进 reveal 时)
           ...
         </div>

       版式 CSS + HTML 结构**不在骨架里**，按内容自由设计；
       可参考 assets/example-deck.html（只看不抄）。
       =========================================================== -->

  <!-- SKELETON-ONLY · 装配时整段删除 -->
  <div class="slide placeholder" data-section="0" data-section-name="骨架自检" data-no-chrome="true">
    <div class="hint">
      <b>SKELETON</b> · 骨架自检页<br/>
      往 <code>.deck</code> 里替换成真实 slides，<br/>
      按 → / ← / Space 翻页，N 看备注，? 看快捷键。
    </div>
  </div>

</div>

<!-- ===== Speaker notes panel ===== -->
<div class="notes" id="notes">
  <div class="title">演讲者备注</div>
  <h3 id="notes-title"></h3>
  <div class="strategy" id="notes-strategy" hidden></div>
  <div class="speak" id="notes-speak"></div>
</div>

<!-- ===== Hotkey help overlay ===== -->
<div class="hotkey-help" id="hotkey-help">
  <div class="panel">
    <h3>键盘快捷键</h3>
    <div><kbd>→</kbd> <kbd>Space</kbd> 下一步 / 下一页</div>
    <div><kbd>←</kbd> 上一步 / 上一页</div>
    <div><kbd>Home</kbd> 第一页 · <kbd>End</kbd> 最后一页</div>
    <div><kbd>N</kbd> 演讲者备注</div>
    <div><kbd>F</kbd> 全屏</div>
    <div><kbd>T</kbd> 时间条 (本节用时)</div>
    <div><kbd>?</kbd> 显示/隐藏本面板</div>
    <div><kbd>Esc</kbd> 关闭</div>
  </div>
</div>

<script>
/* ============================================================
   DECK CONTROLLER
   ============================================================ */
(function () {
  const slides = Array.from(document.querySelectorAll('.slide'));
  const total = slides.length;
  let current = 0;
  let sectionStartTime = Date.now();
  let lastSection = null;
  let timerVisible = false;
  let notesVisible = false;
  let helpVisible = false;

  // === Chrome elements ===
  const progFill = document.getElementById('prog-fill');
  const deckTop = document.getElementById('deck-top');
  const bcSec = document.getElementById('bc-sec');
  const bcName = document.getElementById('bc-name');
  const bcPage = document.getElementById('bc-page');
  const bcTotal = document.getElementById('bc-total');
  const deckTimer = document.getElementById('deck-timer');
  const tSecName = document.getElementById('t-sec-name');
  const tSecBudget = document.getElementById('t-sec-budget');
  const tSecElapsed = document.getElementById('t-sec-elapsed');
  const notes = document.getElementById('notes');
  const notesTitle = document.getElementById('notes-title');
  const notesStrategy = document.getElementById('notes-strategy');
  const notesSpeak = document.getElementById('notes-speak');
  const help = document.getElementById('hotkey-help');

  bcTotal.textContent = total;

  // === Show slide N ===
  function show(idx) {
    if (idx < 0 || idx >= total) return;
    current = idx;
    const active = slides[idx];

    // toggle active class
    slides.forEach((s, i) => s.classList.toggle('active', i === idx));

    // reset stepped state
    if (active.classList.contains('stepped')) {
      active.dataset.stage = '0';
      active.querySelectorAll('.step').forEach(s => s.classList.remove('revealed'));
      // Also reset flow-node lit-by-step
    }
    active.querySelectorAll('[data-lit-step]').forEach(el => el.classList.remove('lit'));

    // restart entry animations
    active.classList.add('no-anim');
    active.classList.remove('playing');
    void active.offsetWidth;
    requestAnimationFrame(() => {
      active.classList.remove('no-anim');
      requestAnimationFrame(() => {
        active.classList.add('playing');
        // also auto-light flow nodes if no stepped behavior
        if (!active.classList.contains('stepped')) {
          autoLightFlow(active);
        }
      });
    });

    // chrome
    updateChrome(active);
    updateNotes(active);
  }

  function autoLightFlow(slide) {
    const lits = slide.querySelectorAll('[data-lit-step]');
    lits.forEach((el, i) => {
      setTimeout(() => el.classList.add('lit'), 200 + i * 200);
    });
  }

  function updateChrome(active) {
    const noChrome = active.dataset.noChrome === 'true';
    const isCover = active.classList.contains('cover');
    const isBreak = active.classList.contains('break');
    const showChrome = !noChrome && !isCover;

    deckTop.classList.toggle('visible', showChrome);
    if (showChrome) {
      const sec = active.dataset.section;
      const name = active.dataset.sectionName;
      bcSec.textContent = sec === '0' ? '' : '§' + sec;
      bcName.textContent = name || '';
      bcPage.textContent = current + 1;
    }
    progFill.style.width = ((current + 1) / total * 100) + '%';

    // section change → reset timer
    const sec = active.dataset.section;
    if (sec !== lastSection) {
      lastSection = sec;
      sectionStartTime = Date.now();
    }
    if (timerVisible && showChrome && sec !== '0') {
      tSecName.textContent = active.dataset.sectionName || '';
      tSecBudget.textContent = active.dataset.time || '?';
      deckTimer.classList.add('visible');
    } else {
      deckTimer.classList.remove('visible');
    }
  }

  function updateNotes(active) {
    const strategy = active.dataset.notesStrategy || '';
    const speak = active.dataset.notesSpeak || '';
    const sec = active.dataset.section;
    const name = active.dataset.sectionName;
    notesTitle.textContent = sec === '0'
      ? (name || '封面')
      : '§' + sec + ' · ' + (name || '');
    if (strategy) {
      notesStrategy.textContent = '策略：' + strategy;
      notesStrategy.hidden = false;
    } else {
      notesStrategy.hidden = true;
    }
    notesSpeak.textContent = speak || '（无备注）';
  }

  // === Step / nav ===
  function next() {
    const active = slides[current];
    if (active.classList.contains('stepped')) {
      const stage = parseInt(active.dataset.stage || '0', 10);
      const max = parseInt(active.dataset.steps || '0', 10);
      if (stage < max) {
        const newStage = stage + 1;
        active.dataset.stage = String(newStage);
        active.querySelectorAll('.step').forEach(s => {
          if (parseInt(s.dataset.step, 10) <= newStage) s.classList.add('revealed');
        });
        return;
      }
    }
    // Compare narrative toggle: data-toggle-compare
    if (active.dataset.toggleCompare === 'true') {
      const stage = document.getElementById('cmp3-stage');
      if (stage && !stage.classList.contains('is-good')) {
        stage.classList.add('is-good');
        const eb = document.getElementById('cmp3-eyebrow');
        const tt = document.getElementById('cmp3-title');
        if (eb) eb.textContent = '工作流的样子';
        if (tt) tt.textContent = '同样的事，工作流是这样的';
        return;
      }
    }
    show(current + 1);
  }

  function prev() {
    const active = slides[current];
    if (active.classList.contains('stepped')) {
      const stage = parseInt(active.dataset.stage || '0', 10);
      if (stage > 0) {
        const newStage = stage - 1;
        active.dataset.stage = String(newStage);
        active.querySelectorAll('.step').forEach(s => {
          if (parseInt(s.dataset.step, 10) > newStage) s.classList.remove('revealed');
        });
        return;
      }
    }
    if (active.dataset.toggleCompare === 'true') {
      const stage = document.getElementById('cmp3-stage');
      if (stage && stage.classList.contains('is-good')) {
        stage.classList.remove('is-good');
        const eb = document.getElementById('cmp3-eyebrow');
        const tt = document.getElementById('cmp3-title');
        if (eb) eb.textContent = '没有工作流的样子';
        if (tt) tt.textContent = '同一件事，散装做是这样的';
        return;
      }
    }
    show(current - 1);
  }

  // === Section timer ===
  function tickTimer() {
    const elapsed = Math.floor((Date.now() - sectionStartTime) / 1000);
    const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const s = (elapsed % 60).toString().padStart(2, '0');
    tSecElapsed.textContent = m + ':' + s;
  }
  setInterval(tickTimer, 1000);

  // === Keyboard ===
  document.addEventListener('keydown', (e) => {
    if (helpVisible && e.key !== '?' && e.key !== 'Escape') return;
    switch (e.key) {
      case 'ArrowRight':
      case ' ':
      case 'PageDown':
      case 'Enter':
        e.preventDefault(); next(); break;
      case 'ArrowLeft':
      case 'PageUp':
        e.preventDefault(); prev(); break;
      case 'Home':
        e.preventDefault(); show(0); break;
      case 'End':
        e.preventDefault(); show(total - 1); break;
      case 'n': case 'N':
        notesVisible = !notesVisible;
        notes.classList.toggle('visible', notesVisible);
        break;
      case 'f': case 'F':
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
        break;
      case 't': case 'T':
        timerVisible = !timerVisible;
        updateChrome(slides[current]);
        break;
      case '?':
        helpVisible = !helpVisible;
        help.classList.toggle('visible', helpVisible);
        break;
      case 'Escape':
        if (helpVisible) { helpVisible = false; help.classList.remove('visible'); }
        else if (notesVisible) { notesVisible = false; notes.classList.remove('visible'); }
        break;
    }
  });

  // === Click navigation ===
  document.querySelector('.deck').addEventListener('click', (e) => {
    // ignore clicks on notes / help
    if (e.target.closest('.notes, .hotkey-help')) return;
    next();
  });

  // === Init ===
  show(0);
})();
</script>

</body>
</html>
